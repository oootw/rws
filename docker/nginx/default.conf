upstream laravel {
    server app:9000;
}

# Сообщает Laravel реальный протокол, когда трафик прошёл через reverse-proxy.
map $http_x_forwarded_proto $real_scheme {
    default $scheme;
    https   https;
    http    http;
}

server {
    listen 80;
    server_name _;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    client_max_body_size 10M;
    server_tokens off;

    # Базовые заголовки безопасности (TLS — на reverse-proxy)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    root /var/www/backend/public;
    index index.php;

    location /privacy/ {
        try_files $uri $uri/ /privacy/index.html;
    }

    location ^~ /s/ {
        alias /var/www/frontend/scan/;
        try_files $uri $uri/ /s/index.html;

        location ~* \.(?:js|css|woff2?|svg|png|jpg|webp|ico)$ {
            alias /var/www/frontend/scan/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri =404;
        }
    }

    location = /s {
        return 301 /s/;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Только index.php — отрезает доступ к произвольным .php-файлам.
    location ~ ^/index\.php$ {
        fastcgi_pass laravel;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS $real_scheme;
        include fastcgi_params;
        fastcgi_param HTTP_PROXY "";
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
