# Полный локальный стек в Docker.
# Запуск: make local-up

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    environment:
      RUN_MIGRATIONS: "true"
      RUN_SEED: "${RUN_SEED:-true}"
    volumes:
      - ./backend:/var/www/html
      - app_storage:/var/www/html/storage/app

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - ./backend:/var/www/html
      - app_storage:/var/www/html/storage/app

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - ./backend:/var/www/html
      - app_storage:/var/www/html/storage/app

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        VITE_ALLOW_TENANT_QUERY: "1"
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./backend/public:/var/www/backend/public:ro
