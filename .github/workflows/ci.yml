name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (PHP 8.4 + Pest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: testing
          POSTGRES_DB: testing
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U testing"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: testing
      DB_PASSWORD: testing
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      APP_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl, pdo_pgsql, redis, zip, bcmath
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Pint (code style)
        run: ./vendor/bin/pint --test

      - name: Run Pest
        run: php artisan test

  frontend-owner:
    name: Frontend / owner (vitest + lint + typecheck + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install workspaces
        run: npm ci --ignore-scripts

      - name: Typecheck shared
        run: npm run typecheck --workspace shared

      - name: Lint owner
        run: npm run lint --workspace owner

      - name: Typecheck owner
        run: npm run typecheck --workspace owner

      - name: Test owner
        run: npm run test --workspace owner

      - name: Build owner
        run: npm run build:owner

  frontend-scan:
    name: Frontend / scan (typecheck + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install workspaces
        run: npm ci --ignore-scripts

      - name: Typecheck scan
        run: npm run typecheck --workspace scan

      - name: Build scan
        run: npm run build:scan
